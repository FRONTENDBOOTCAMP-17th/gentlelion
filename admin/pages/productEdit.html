<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제품 수정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="./components/product/edit.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <div
      class="bg-white w-full max-w-lg max-h-[95vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200"
    >
      <div
        class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10"
      >
        <h2 class="text-xl font-bold text-gray-900">제품 수정</h2>
        <button
          id="backBtnTop"
          class="text-gray-400 hover:text-black cursor-pointer"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form
        id="productEditForm"
        class="flex-1 overflow-y-auto p-6 space-y-5 bg-white"
      >
        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >제품명</label
          >
          <input
            name="name"
            type="text"
            class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
            required
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
              >가격</label
            >
            <input
              name="price"
              type="number"
              class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              required
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
              >카테고리</label
            >
            <select
              name="category"
              class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none bg-white"
            >
              <option value="sunglasses">선글라스</option>
              <option value="optical">안경</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >설명</label
          >
          <textarea
            name="description"
            class="w-full border border-gray-200 rounded-xl p-4 text-sm h-32 resize-none focus:ring-1 focus:ring-black outline-none"
          ></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >재고 수량</label
          >
          <input
            name="stock"
            type="number"
            class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
          />
        </div>

        <div class="pt-4 border-t border-gray-100">
          <p class="text-[11px] font-bold text-gray-400 mb-4 uppercase">
            스펙시피케이션
          </p>
          <div class="space-y-3">
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >프레임 너비</span
              >
              <input
                name="frameWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >렌즈 높이</span
              >
              <input
                name="lensHeight"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >렌즈 너비</span
              >
              <input
                name="lensWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >브릿지 너비</span
              >
              <input
                name="bridgeWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >템플 길이</span
              >
              <input
                name="templeLength"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
          </div>
        </div>
      </form>

      <div class="p-6 border-t border-gray-100 grid grid-cols-2 gap-3 bg-white">
        <button
          type="button"
          id="backBtnBottom"
          class="h-12 bg-gray-100 text-gray-700 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors"
        >
          취소
        </button>
        <button
          form="productEditForm"
          type="submit"
          class="h-12 bg-black text-white rounded-xl font-bold text-sm hover:bg-zinc-800 transition-colors"
        >
          수정
        </button>
      </div>
    </div>
  </body>
</html>
