<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 로그인</title>
    <link rel="stylesheet" href="../../src/style.css" />
    <link rel="stylesheet" href="../../src/components/style.css" />
    <script type="module" src="./components/login/handleLogin.js"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">
    <div
      class="bg-white rounded-lg shadow-md w-full max-w-sm px-6 py-8 sm:px-10 sm:py-10"
    >
      <h1
        class="text-center text-xl font-bold tracking-widest text-gray-900 mb-1"
      >
        GENTLE MONSTER
      </h1>
      <p class="text-center text-sm text-gray-500 mb-8">관리자 로그인</p>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="mb-5">
          <label class="block text-sm text-gray-700 mb-1" for="email"
            >이메일</label
          >
          <input
            id="email"
            type="email"
            placeholder="admin@gentlemonster.com"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-800 placeholder-gray-400 outline-none focus:border-gray-500 transition"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm text-gray-700 mb-1" for="password"
            >비밀번호</label
          >
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm text-gray-800 placeholder-gray-400 outline-none focus:border-gray-500 transition"
          />
        </div>

        <p id="errorMsg" class="hidden text-xs text-red-500 mb-3 text-center">
          이메일 또는 비밀번호가 올바르지 않습니다.
        </p>

        <button
          type="submit"
          id="submitBtn"
          class="w-full bg-gray-900 hover:bg-black text-white text-sm font-medium py-2.5 rounded flex items-center justify-center gap-2 transition"
        >
          <span>→</span> 로그인
        </button>
      </form>

      <p class="mt-6 text-center text-xs text-gray-400">
        테스트 계정: admin&#64;gentlemonster.com / admin123
      </p>
    </div>
  </body>
</html>
