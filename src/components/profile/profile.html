<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="./handlerProfile.js"></script>
    <script type="module" src="../../layout.js"></script>
  </head>
  <body class="bg-(--bg) flex flex-col min-h-screen" data-theme="light">
    <div
      id="mobileMenu"
      class="fixed opacity-0 pointer-events-none transition-all duration-500 top-0 z-49 left-0 bg-white w-screen h-full"
    >
      <aside class="relative top-40 ml-5">
        <nav>
          <ul class="font-medium flex flex-col gap-2 mb-3">
            <li class="menu-animate text-[22px]">
              <a class="w-max" href="/">선글라스</a>
            </li>
            <li class="menu-animate text-[22px]">
              <a class="w-max" href="/">안경</a>
            </li>
            <li class="menu-animate text-[22px]">
              <a class="w-max" href="/">컬렉션</a>
            </li>
          </ul>
          <ul class="font-medium flex flex-col gap-2">
            <li class="menu-animate text-[18px]">
              <a class="w-max" href="/">스토리</a>
            </li>
            <li class="menu-animate text-[18px]">
              <a class="w-max" href="/">서비스</a>
            </li>
          </ul>
        </nav>

        <div class="mt-35 text-[12px] flex flex-col">
          <a class="menu-animate w-max" href="/" class="">로그인 / 계정 생성</a>
          <a class="menu-animate w-max" href="/">주문 추가하기</a>
        </div>
        <div class="mt-2 text-[12px] w-max">
          <a class="menu-animate w-max" href="/">위시리스트<sup>0</sup></a>
          <p class="menu-animate font-medium mt-11">
            아직 위시리스트에 추가된 제품이 없습니다.
          </p>
        </div>

        <div class="text-[12px] mt-12 font-medium flex flex-col gap-3">
          <a class="menu-animate w-max" href="/">고객 서비스</a>
          <a class="menu-animate w-max" href="/">국가: South Korea</a>
        </div>
      </aside>
    </div>

    <aside class="navigation mx-3 md:px-8 lg:px-15"></aside>

    <main class="flex-1 flex flex-col h-full">
      <div class="buttonMenu px-15 flex justify-between max-md:px-3">
        <div class="px-[3.5px]">
          <button
            class="cursor-pointer tabBtn mr-2.5 border text-[13px] text-[#858585] leading-4.25 border-[#858585] rounded-[20px] px-4 py-1 max-md:text-[10px]"
          >
            구매한 제품
          </button>
          <button
            class="cursor-pointer tabBtn mr-2.5 border text-[13px] text-[#858585] rounded-[20px] border-[#858585] px-4 py-1 max-md:text-[10px]"
          >
            위시리스트
          </button>
          <button
            class="cursor-pointer tabBtn mr-2.5 border text-[13px] text-[#858585] rounded-[20px] border-[#858585] px-4 py-1 max-md:text-[10px]"
          >
            프로필
          </button>
        </div>
        <button class="logout-btn cursor-pointer logout max-md:hidden">
          로그아웃
        </button>
      </div>
      <div class="profile-section">
        <div class="flex flex-col items-center mt-15 max-md:mt-0">
          <div class="w-full px-15 max-md:px-6">
            <h2 class="text-[17px] h-15 flex items-center md:justify-center">
              프로필
            </h2>
          </div>
          <div class="flex flex-col items-center w-full max-md:px-6 px-15">
            <div class="w-full max-w-162 flex flex-col gap-1 mt-10">
              <p class="leading-5.5">
                <span id="fn">홍</span><span id="ln">길동</span>
              </p>
              <p id="email" class="leading-5.5">@gmail.com</p>
              <p id="phone" class="leading-5.5]">010-1101-1111</p>
            </div>
          </div>
          <div
            id="profileEditForm"
            class="hidden w-full max-w-162 flex flex-col gap-3 mt-4 mb-2 p-5 border border-[#e5e7eb] rounded-xl bg-[#fafafa]"
          >
            <div class="flex flex-col gap-1">
              <label class="text-[11px] text-[#858585]">이름</label>
              <div class="flex gap-2">
                <input
                  id="editFn"
                  type="text"
                  placeholder="성"
                  class="w-1/2 border border-[#d1d5db] rounded-lg px-3 py-2 text-[13px] outline-none focus:border-[#111] transition"
                />
                <input
                  id="editLn"
                  type="text"
                  placeholder="이름"
                  class="w-1/2 border border-[#d1d5db] rounded-lg px-3 py-2 text-[13px] outline-none focus:border-[#111] transition"
                />
              </div>
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-[11px] text-[#858585]">이메일</label>
              <input
                id="editEmail"
                type="email"
                placeholder="이메일 주소"
                class="border border-[#d1d5db] rounded-lg px-3 py-2 text-[13px] outline-none focus:border-[#111] transition"
              />
            </div>

            <div class="flex flex-col gap-1">
              <label class="text-[11px] text-[#858585]">전화번호</label>
              <input
                id="editPhone"
                type="tel"
                placeholder="010-0000-0000"
                class="border border-[#d1d5db] rounded-lg px-3 py-2 text-[13px] outline-none focus:border-[#111] transition"
              />
            </div>

            <div class="flex gap-2 mt-1">
              <button
                id="profileSaveBtn"
                class="cursor-pointer flex-1 bg-[#111] text-white rounded-lg py-2.5 text-[12px] font-medium"
              >
                저장하기
              </button>
              <button
                id="profileCancelBtn"
                class="cursor-pointer flex-1 border border-[#d1d5db] rounded-lg py-2.5 text-[12px] text-[#555]"
              >
                취소
              </button>
            </div>
          </div>
          <div
            class="w-full flex flex-col items-center justify-center max-md:px-6 px-15"
          >
            <button
              id="profileEditBtn"
              class="cursor-pointer flex items-center justify-center w-full max-w-162 rounded-lg border border-[#ababab] mt-1 px-6 py-3 text-center text-[12px] leading-5 text-[#111]"
            >
              프로필 편집하기
            </button>
          </div>
          <div
            class="w-full flex flex-col items-center justify-center max-md:px-6 px-15 mt-10"
          >
            <span class="text-[10px] flex w-full max-w-162">주소록</span>
            <div
              class="flex justify-between items-start w-full max-w-162 mt-10 pb-5 border-b border-[#e5e7eb]"
            >
              <div class="flex flex-col gap-1">
                <p class="text-[15px]">홍길동</p>
                <p class="text-[13px]">
                  멋쟁이 사자처럼 프론트엔드 부트캠프 화이팅!
                </p>
                <span class="text-[13px]">010 1111 1111</span>
              </div>

              <div class="flex gap-2 ml-4 shrink-0">
                <button
                  class="bg-[#e5e7eb] cursor-pointer px-4 py-2 text-[12px] rounded-md"
                >
                  삭제하기
                </button>
                <button
                  class="bg-[#e5e7eb] cursor-pointer px-4 py-2 text-[12px] rounded-md"
                >
                  편집하기
                </button>
              </div>
            </div>

            <button
              class="cursor-pointer flex items-center justify-center w-full max-w-162 rounded-lg border border-[#ababab] mt-1 px-6 py-3 text-center text-[12px] leading-5 text-[#111]"
            >
              새로운 주소 추가하기
            </button>
          </div>
          <div
            class="w-full flex flex-col items-center justify-center max-md:px-6 px-15"
          >
            <button
              class="logout-btn cursor-pointer md:hidden flex items-center justify-center w-full max-w-162 rounded-lg border border-[#ababab] mt-1 px-6 py-3 text-center text-[12px] leading-5 text-[#111]"
            >
              로그아웃
            </button>
          </div>
        </div>
      </div>
      <div
        class="wishlist-section hidden flex flex-col justify-center items-center mt-15"
      >
        <h2 class="font-bold">
          위시리스트<span id="wishLength" class="text-[10px] align-super"
            >2</span
          >
        </h2>
        <div
          id="productContainer"
          class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4 justify-between"
        ></div>
      </div>
      <div class="order-section hidden flex-1 flex flex-col items-center">
        <h2 class="mt-15 font-bold text-center">최근 구매 내역</h2>
        <div
          class="order-no flex-1 flex flex-col items-center justify-center text-[11px] font-bold hidden"
        >
          <p>아직 제품을 구매한 내역이 없습니다.</p>
          <p>쇼핑을 계속하거나 오프라인 구매 내역을 추가하세요.</p>
          <button
            id="goIndexBtn"
            class="cursor-pointer mt-8 w-80 border border-(--border) text-center py-4 rounded-lg"
          >
            쇼핑 계속하기
          </button>
        </div>
        <div class="order-section-card flex flex-col w-100 md:w-200"></div>
        <div class="order-detail hidden flex flex-col w-100 md:w-200">
          <button
            class="order-back-btn cursor-pointer text-left text-[13px] py-4"
          >
            ← 목록으로
          </button>
          <div class="order-detail-content"></div>
        </div>
      </div>
    </main>
  </body>
</html>
