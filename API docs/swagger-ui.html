<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GentleLion API 명세서</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css"/>
  <style>
    body { margin: 0; background: #fafafa; }
    .swagger-ui .topbar { background: #1a1a2e; }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    .swagger-ui .topbar-wrapper .link span { color: #fff; font-size: 18px; font-weight: 700; }
    .custom-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .custom-header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .custom-header p { margin: 4px 0 0; font-size: 13px; opacity: 0.75; }
    .header-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="custom-header">
    <div>
      <h1>🦁 GentleLion API</h1>
      <p>FRONTENDBOOTCAMP-17th · 쇼핑몰 REST API 명세서</p>
    </div>
    <span class="header-badge">v1.0.0</span>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-standalone-preset.min.js"></script>
  <script>
    const spec = {
      openapi: "3.0.0",
      info: {
        title: "GentleLion API",
        version: "1.0.0",
        description: "GentleLion 쇼핑몰 REST API 명세서입니다.\n\n로그인 후 발급받은 JWT 토큰을 **Authorize** 버튼을 통해 입력하면 인증이 필요한 API를 사용할 수 있습니다. \n\n 유저: testuser01 / pass1234, 어드민: admin01 / pass1234"
      },
      servers: [{ url: "http://localhost:5173/api", description: "API 서버" }],
      components: {
        securitySchemes: {
          BearerAuth: {
            type: "http",
            scheme: "bearer",
            bearerFormat: "JWT",
            description: "로그인 후 발급받은 JWT 토큰을 입력하세요."
          }
        },
        schemas: {
          User: {
            type: "object",
            properties: {
              id: { type: "integer", example: 1 },
              username: { type: "string", example: "test@example.com" },
              nickname: { type: "string", example: "테스트유저" },
              role: { type: "string", enum: ["user","admin"], example: "user" },
              createdAt: { type: "string", format: "date-time", example: "2025-01-15T10:30:00" },
              point: { type: "integer", example: 0 }
            }
          },
          Product: {
            type: "object",
            properties: {
              id: { type: "integer", example: 1 },
              name: { type: "string", example: "상품명" },
              price: { type: "integer", example: 10000 },
              category: { type: "string", example: "clothing" },
              description: { type: "string", example: "상품 설명" },
              stock: { type: "integer", example: 100 },
              image: { type: "string", example: "https://example.com/image.jpg" },
              createdAt: { type: "string", format: "date-time" }
            }
          },
          Review: {
            type: "object",
            properties: {
              id: { type: "integer", example: 1 },
              productId: { type: "integer", example: 1 },
              userId: { type: "integer", example: 1 },
              rating: { type: "integer", minimum: 1, maximum: 5, example: 5 },
              content: { type: "string", example: "좋은 상품입니다." },
              status: { type: "string", enum: ["active","hidden"], example: "active" },
              createdAt: { type: "string", format: "date-time" }
            }
          },
          CartItem: {
            type: "object",
            properties: {
              id: { type: "integer", example: 1 },
              productId: { type: "integer", example: 1 },
              product: { "$ref": "#/components/schemas/Product" },
              quantity: { type: "integer", example: 2 }
            }
          },
          Order: {
            type: "object",
            properties: {
              id: { type: "integer", example: 1 },
              userId: { type: "integer", example: 1 },
              items: {
                type: "array",
                items: {
                  type: "object",
                  properties: {
                    productId: { type: "integer" },
                    productName: { type: "string" },
                    price: { type: "integer" },
                    quantity: { type: "integer" }
                  }
                }
              },
              totalPrice: { type: "integer", example: 30000 },
              status: { type: "string", enum: ["pending","confirmed","shipping","delivered","cancelled"], example: "pending" },
              createdAt: { type: "string", format: "date-time" }
            }
          },
          Error: {
            type: "object",
            properties: {
              message: { type: "string" }
            }
          }
        }
      },
      tags: [
        { name: "Auth", description: "인증 관련 API" },
        { name: "Products", description: "상품 관련 API" },
        { name: "Wishlist", description: "위시리스트(찜하기) API" },
        { name: "Reviews", description: "상품 리뷰 API" },
        { name: "Cart", description: "장바구니 API" },
        { name: "Orders", description: "주문/결제 API" },
        { name: "Admin", description: "관리자 전용 API (admin role 필요)" }
      ],
      paths: {

        // ─── AUTH ───────────────────────────────────────────────
        "/auth/me": {
          get: {
            tags: ["Auth"],
            summary: "내 정보 조회",
            description: "현재 로그인한 사용자의 정보를 조회합니다.",
            security: [{ BearerAuth: [] }],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: { "$ref": "#/components/schemas/User" },
                    examples: {
                      user: {
                        summary: "일반 유저",
                        value: { id: 1, username: "test@example.com", nickname: "테스트유저", role: "user", createdAt: "2025-01-15T10:30:00", point: 0 }
                      },
                      admin: {
                        summary: "관리자",
                        value: { id: 2, username: "admin@example.com", nickname: "어드민", role: "admin", createdAt: "2025-01-15T10:30:00", point: 0 }
                      }
                    }
                  }
                }
              },
              401: { description: "아이디 또는 비밀번호가 올바르지 않습니다.", content: { "application/json": { schema: { "$ref": "#/components/schemas/Error" } } } }
            }
          },
          patch: {
            tags: ["Auth"],
            summary: "회원정보 수정",
            description: "현재 로그인한 사용자의 정보를 수정합니다.",
            security: [{ BearerAuth: [] }],
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    properties: {
                      nickname: { type: "string", description: "새 닉네임 (2~20자)", example: "새닉네임" },
                      password: { type: "string", description: "새 비밀번호 (4~20자)", example: "newpass123" }
                    }
                  }
                }
              }
            },
            responses: {
              200: { description: "수정 성공", content: { "application/json": { schema: { "$ref": "#/components/schemas/User" } } } },
              401: { description: "인증 실패" }
            }
          },
          delete: {
            tags: ["Auth"],
            summary: "회원탈퇴",
            description: "현재 로그인한 사용자의 계정을 삭제합니다.",
            security: [{ BearerAuth: [] }],
            responses: {
              204: { description: "탈퇴 성공" },
              401: { description: "인증 실패" }
            }
          }
        },
        "/auth/signup": {
          post: {
            tags: ["Auth"],
            summary: "회원가입",
            description: "회원 정보를 저장합니다.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    required: ["username","password","nickname"],
                    properties: {
                      username: { type: "string", description: "아이디 (4~20자, 영문/숫자)", example: "testuser01" },
                      password: { type: "string", description: "비밀번호 (4~20자)", example: "pass1234" },
                      nickname: { type: "string", description: "닉네임 (2~20자)", example: "테스트유저" }
                    }
                  }
                }
              }
            },
            responses: {
              201: { description: "회원가입 성공", content: { "application/json": { schema: { "$ref": "#/components/schemas/User" } } } },
              409: { description: "이미 사용 중인 아이디입니다.", content: { "application/json": { schema: { "$ref": "#/components/schemas/Error" } } } }
            }
          }
        },
        "/auth/login": {
          post: {
            tags: ["Auth"],
            summary: "로그인",
            description: "아이디와 비밀번호로 로그인하여 JWT 토큰을 발급 받습니다.",
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    required: ["username","password"],
                    properties: {
                      username: { type: "string", example: "testuser01" },
                      password: { type: "string", example: "pass1234" }
                    }
                  }
                }
              }
            },
            responses: {
              200: {
                description: "로그인 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "object",
                      properties: {
                        token: { type: "string", example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." },
                        user: { "$ref": "#/components/schemas/User" }
                      }
                    }
                  }
                }
              },
              401: { description: "아이디 또는 비밀번호가 올바르지 않습니다.", content: { "application/json": { schema: { "$ref": "#/components/schemas/Error" } } } }
            }
          }
        },

        // ─── PRODUCTS ────────────────────────────────────────────
        "/products": {
          get: {
            tags: ["Products"],
            summary: "상품 목록 조회 및 검색",
            description: "상품 목록을 조회하거나 키워드로 검색합니다.",
            parameters: [
              { name: "q", in: "query", schema: { type: "string" }, description: "검색 키워드" },
              { name: "page", in: "query", schema: { type: "integer", default: 1 }, description: "페이지 번호" },
              { name: "limit", in: "query", schema: { type: "integer", default: 20 }, description: "페이지당 항목 수" }
            ],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "object",
                      properties: {
                        items: { type: "array", items: { "$ref": "#/components/schemas/Product" } },
                        total: { type: "integer" },
                        page: { type: "integer" },
                        limit: { type: "integer" }
                      }
                    }
                  }
                }
              }
            }
          }
        },
        "/products/{id}": {
          get: {
            tags: ["Products"],
            summary: "상품 상세 조회",
            description: "특정 상품의 상세 정보를 조회합니다.",
            parameters: [
              { name: "id", in: "path", required: true, schema: { type: "integer" }, description: "상품 ID" }
            ],
            responses: {
              200: { description: "조회 성공", content: { "application/json": { schema: { "$ref": "#/components/schemas/Product" } } } },
              404: { description: "상품을 찾을 수 없습니다." }
            }
          }
        },
        "/products/category/{category}": {
          get: {
            tags: ["Products"],
            summary: "카테고리별 상품 조회",
            description: "카테고리별로 상품 목록을 조회합니다.",
            parameters: [
              { name: "category", in: "path", required: true, schema: { type: "string" }, description: "카테고리명" },
              { name: "page", in: "query", schema: { type: "integer", default: 1 } },
              { name: "limit", in: "query", schema: { type: "integer", default: 20 } }
            ],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "object",
                      properties: {
                        items: { type: "array", items: { "$ref": "#/components/schemas/Product" } },
                        total: { type: "integer" }
                      }
                    }
                  }
                }
              }
            }
          }
        },

        // ─── WISHLIST ─────────────────────────────────────────────
        "/wishlist": {
          get: {
            tags: ["Wishlist"],
            summary: "위시리스트 조회",
            description: "현재 로그인한 사용자의 위시리스트를 조회합니다.",
            security: [{ BearerAuth: [] }],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "array",
                      items: {
                        type: "object",
                        properties: {
                          id: { type: "integer" },
                          product: { "$ref": "#/components/schemas/Product" },
                          createdAt: { type: "string", format: "date-time" }
                        }
                      }
                    }
                  }
                }
              },
              401: { description: "인증 실패" }
            }
          },
          post: {
            tags: ["Wishlist"],
            summary: "위시리스트 상품 추가",
            description: "위시리스트에 상품을 추가합니다.",
            security: [{ BearerAuth: [] }],
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    required: ["productId"],
                    properties: {
                      productId: { type: "integer", example: 1 }
                    }
                  }
                }
              }
            },
            responses: {
              201: { description: "추가 성공" },
              401: { description: "인증 실패" },
              409: { description: "이미 위시리스트에 있는 상품입니다." }
            }
          }
        },
        "/wishlist/{id}": {
          delete: {
            tags: ["Wishlist"],
            summary: "위시리스트 상품 삭제",
            description: "위시리스트에서 특정 상품을 삭제합니다.",
            security: [{ BearerAuth: [] }],
            parameters: [
              { name: "id", in: "path", required: true, schema: { type: "integer" }, description: "위시리스트 항목 ID" }
            ],
            responses: {
              204: { description: "삭제 성공" },
              401: { description: "인증 실패" },
              404: { description: "항목을 찾을 수 없습니다." }
            }
          }
        },

        // ─── REVIEWS ─────────────────────────────────────────────
        "/reviews": {
          get: {
            tags: ["Reviews"],
            summary: "리뷰 조회",
            description: "특정 상품의 리뷰 목록을 조회합니다.",
            parameters: [
              { name: "productId", in: "query", required: true, schema: { type: "integer" }, description: "상품 ID" },
              { name: "page", in: "query", schema: { type: "integer", default: 1 } },
              { name: "limit", in: "query", schema: { type: "integer", default: 10 } }
            ],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "object",
                      properties: {
                        items: { type: "array", items: { "$ref": "#/components/schemas/Review" } },
                        total: { type: "integer" }
                      }
                    }
                  }
                }
              }
            }
          },
          post: {
            tags: ["Reviews"],
            summary: "리뷰 생성",
            description: "상품에 리뷰를 작성합니다.",
            security: [{ BearerAuth: [] }],
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    required: ["productId","rating","content"],
                    properties: {
                      productId: { type: "integer", example: 1 },
                      rating: { type: "integer", minimum: 1, maximum: 5, example: 5 },
                      content: { type: "string", example: "정말 좋은 상품입니다!" }
                    }
                  }
                }
              }
            },
            responses: {
              201: { description: "생성 성공", content: { "application/json": { schema: { "$ref": "#/components/schemas/Review" } } } },
              401: { description: "인증 실패" }
            }
          }
        },
        "/reviews/{id}": {
          put: {
            tags: ["Reviews"],
            summary: "리뷰 수정",
            description: "작성한 리뷰를 수정합니다.",
            security: [{ BearerAuth: [] }],
            parameters: [
              { name: "id", in: "path", required: true, schema: { type: "integer" }, description: "리뷰 ID" }
            ],
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    properties: {
                      rating: { type: "integer", minimum: 1, maximum: 5, example: 4 },
                      content: { type: "string", example: "수정된 리뷰 내용입니다." }
                    }
                  }
                }
              }
            },
            responses: {
              200: { description: "수정 성공", content: { "application/json": { schema: { "$ref": "#/components/schemas/Review" } } } },
              401: { description: "인증 실패" },
              403: { description: "권한이 없습니다." },
              404: { description: "리뷰를 찾을 수 없습니다." }
            }
          },
          delete: {
            tags: ["Reviews"],
            summary: "리뷰 삭제",
            description: "작성한 리뷰를 삭제합니다.",
            security: [{ BearerAuth: [] }],
            parameters: [
              { name: "id", in: "path", required: true, schema: { type: "integer" }, description: "리뷰 ID" }
            ],
            responses: {
              204: { description: "삭제 성공" },
              401: { description: "인증 실패" },
              403: { description: "권한이 없습니다." },
              404: { description: "리뷰를 찾을 수 없습니다." }
            }
          }
        },

        // ─── CART ─────────────────────────────────────────────────
        "/cart": {
          get: {
            tags: ["Cart"],
            summary: "장바구니 조회",
            description: "현재 로그인한 사용자의 장바구니를 조회합니다.",
            security: [{ BearerAuth: [] }],
            responses: {
              200: {
                description: "조회 성공",
                content: {
                  "application/json": {
                    schema: {
                      type: "object",
                      properties: {
                        items: { type: "array", items: { "$ref": "#/components/schemas/CartItem" } },
                        totalPrice: { type: "integer", example: 50000 }
                      }
                    }
                  }
                }
              },
              401: { description: "인증 실패" }
            }
          },
          post: {
            tags: ["Cart"],
            summary: "장바구니 상품 추가",
            description: "장바구니에 상품을 추가합니다.",
            security: [{ BearerAuth: [] }],
            requestBody: {
              required: true,
              content: {
                "application/json": {
                  schema: {
                    type: "object",
                    required: ["productId","quantity"],
                    properties: {
                      productId: { type: "integer", example: 1 },
                      quantity: { type: "integer", minimum: 1, example: 2 }
                    }
                  }
                }
              }
            },
            responses: {
              201: { description: "추가 성공" },
              401: { description: "인증 실패" }
            }
          },
          delete: {
            tags: ["Cart"],
            summary: "장바구니 상품 전체 삭제",
            description: "장바구니의 모든 상품을 삭제합니다.",
            security: [{ BearerAuth: [] }],
            responses: {
              204: { description: "전체 삭제 성공" },
              401: { description: "인증 실패" }
            }
          }
        },
        "/cart/{id}": {
          delete: {
            tags: ["Cart"],
            summary: "장바구니 상품 선택 삭제",
            description: "장바구니에서 특정 상품을 삭제합니다.",
            security: [{ BearerAuth: [] }],
            parameters: [
              { name: "id", in: "path", required: true, schema: { type: "integer" }, description: "장바구니 항목 ID" }
            ],
            responses: {
              204: { description: "삭제 성공" },
              401: { description: "인증 실패" },
              404: { description: "항목을 찾을 수 없습니다." }
            }
          }
        },

        // ─── ORDERS ───────────────────────────────────────────────
        "/orders": {
          get: {
            tags: ["Orders"],
            summary: "주문 목록 조회",
            description: "현재 로그인한 사용자의 주문 목록을 조회합니다.",
            security: [{ BearerAuth: [] }],
            parameters: [
              { name: "page", in: "query", schema: { type: "integer", default: 1 } },

    function mockResponse(status, body) {
      const bodyStr = (body === null || body === undefined) ? "" : JSON.stringify(body);
      return new Response(bodyStr, {
        status,
        headers: { "Content-Type": "application/json", "Access-Control-Allow-Origin": "*" }
      });
    }

    function requireAuth(headers) {
      const auth = (headers instanceof Headers ? headers.get("Authorization") : headers?.["Authorization"]) || "";
      const token = auth.replace("Bearer ", "");
      if (!token || !token.startsWith("mock-token-")) return null;
      const userId = parseInt(token.replace("mock-token-", ""));
      return mockDB.users.find(u => u.id === userId) || null;
    }

    function paginate(arr, params) {
      const page = parseInt(params.get("page") || "1");
      const limit = parseInt(params.get("limit") || "20");
      return { items: arr.slice((page-1)*limit, page*limit), total: arr.length, page, limit };
    }

    const originalFetch = window.fetch.bind(window);
    window.fetch = async function(input, init) {
      const url = (typeof input === "string" ? input : input?.url) || "";
      if (!url.includes("localhost:5173/api")) return originalFetch(input, init);

      const urlObj = new URL(url);
      const path = urlObj.pathname.replace("/api", "");
      const params = urlObj.searchParams;
      const method = (init?.method || "GET").toUpperCase();
      let body = {};
      try { body = JSON.parse(init?.body || "{}"); } catch {}
      const headers = new Headers(init?.headers || {});

      await new Promise(r => setTimeout(r, 250));

      // ── Auth ──
      if (method === "POST" && path === "/auth/signup") {
        if (!body.username || !body.password || !body.nickname)
          return mockResponse(400, { message: "필수 항목을 입력하세요." });
        if (mockDB.users.find(u => u.username === body.username))
          return mockResponse(409, { message: "이미 사용 중인 아이디입니다." });
        const user = { id: mockDB.nextId.user++, username: body.username, password: body.password, nickname: body.nickname, role: "user", createdAt: new Date().toISOString(), point: 0 };
        mockDB.users.push(user);
        const { password: _, ...safeUser } = user;
        return mockResponse(201, safeUser);
      }
      if (method === "POST" && path === "/auth/login") {
        const user = mockDB.users.find(u => u.username === body.username && u.password === body.password);
        if (!user) return mockResponse(401, { message: "아이디 또는 비밀번호가 올바르지 않습니다." });
        const { password: _, ...safeUser } = user;
        return mockResponse(200, { token: `mock-token-${user.id}`, user: safeUser });
      }
      if (method === "GET" && path === "/auth/me") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const { password: _, ...safeUser } = user;
        return mockResponse(200, safeUser);
      }
      if (method === "PATCH" && path === "/auth/me") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        if (body.nickname) user.nickname = body.nickname;
        if (body.password) user.password = body.password;
        const { password: _, ...safeUser } = user;
        return mockResponse(200, safeUser);
      }
      if (method === "DELETE" && path === "/auth/me") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        mockDB.users = mockDB.users.filter(u => u.id !== user.id);
        return mockResponse(204, null);
      }

      // ── Products ──
      if (method === "GET" && path === "/products") {
        const q = params.get("q") || "";
        const filtered = q ? mockDB.products.filter(p => p.name.includes(q) || p.description.includes(q)) : mockDB.products;
        return mockResponse(200, paginate(filtered, params));
      }
      if (method === "GET" && /^\/products\/\d+$/.test(path)) {
        const p = mockDB.products.find(p => p.id === parseInt(path.split("/")[2]));
        return p ? mockResponse(200, p) : mockResponse(404, { message: "상품을 찾을 수 없습니다." });
      }
      if (method === "GET" && /^\/products\/category\/.+/.test(path)) {
        const cat = decodeURIComponent(path.split("/")[3]);
        return mockResponse(200, paginate(mockDB.products.filter(p => p.category === cat), params));
      }

      // ── Wishlist ──
      if (method === "GET" && path === "/wishlist") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const list = mockDB.wishlist.filter(w => w.userId === user.id).map(w => ({ ...w, product: mockDB.products.find(p => p.id === w.productId) }));
        return mockResponse(200, list);
      }
      if (method === "POST" && path === "/wishlist") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        if (mockDB.wishlist.find(w => w.userId === user.id && w.productId === body.productId))
          return mockResponse(409, { message: "이미 위시리스트에 있는 상품입니다." });
        const item = { id: mockDB.nextId.wishlist++, userId: user.id, productId: body.productId, createdAt: new Date().toISOString() };
        mockDB.wishlist.push(item);
        return mockResponse(201, item);
      }
      if (method === "DELETE" && /^\/wishlist\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const idx = mockDB.wishlist.findIndex(w => w.id === parseInt(path.split("/")[2]) && w.userId === user.id);
        if (idx === -1) return mockResponse(404, { message: "항목을 찾을 수 없습니다." });
        mockDB.wishlist.splice(idx, 1);
        return mockResponse(204, null);
      }

      // ── Reviews ──
      if (method === "GET" && path === "/reviews") {
        const productId = parseInt(params.get("productId") || "0");
        return mockResponse(200, paginate(mockDB.reviews.filter(r => r.productId === productId), params));
      }
      if (method === "POST" && path === "/reviews") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const review = { id: mockDB.nextId.review++, productId: body.productId, userId: user.id, rating: body.rating, content: body.content, status: "active", createdAt: new Date().toISOString() };
        mockDB.reviews.push(review);
        return mockResponse(201, review);
      }
      if (method === "PUT" && /^\/reviews\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const review = mockDB.reviews.find(r => r.id === parseInt(path.split("/")[2]));
        if (!review) return mockResponse(404, { message: "리뷰를 찾을 수 없습니다." });
        if (review.userId !== user.id && user.role !== "admin") return mockResponse(403, { message: "권한이 없습니다." });
        if (body.rating) review.rating = body.rating;
        if (body.content) review.content = body.content;
        return mockResponse(200, review);
      }
      if (method === "DELETE" && /^\/reviews\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const idx = mockDB.reviews.findIndex(r => r.id === parseInt(path.split("/")[2]));
        if (idx === -1) return mockResponse(404, { message: "리뷰를 찾을 수 없습니다." });
        mockDB.reviews.splice(idx, 1);
        return mockResponse(204, null);
      }

      // ── Cart ──
      if (method === "GET" && path === "/cart") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const items = mockDB.cart.filter(c => c.userId === user.id).map(c => ({ ...c, product: mockDB.products.find(p => p.id === c.productId) }));
        return mockResponse(200, { items, totalPrice: items.reduce((s, c) => s + (c.product?.price || 0) * c.quantity, 0) });
      }
      if (method === "POST" && path === "/cart") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const existing = mockDB.cart.find(c => c.userId === user.id && c.productId === body.productId);
        if (existing) { existing.quantity += (body.quantity || 1); return mockResponse(201, existing); }
        const item = { id: mockDB.nextId.cart++, userId: user.id, productId: body.productId, quantity: body.quantity || 1 };
        mockDB.cart.push(item);
        return mockResponse(201, item);
      }
      if (method === "DELETE" && path === "/cart") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        mockDB.cart = mockDB.cart.filter(c => c.userId !== user.id);
        return mockResponse(204, null);
      }
      if (method === "DELETE" && /^\/cart\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const idx = mockDB.cart.findIndex(c => c.id === parseInt(path.split("/")[2]) && c.userId === user.id);
        if (idx === -1) return mockResponse(404, { message: "항목을 찾을 수 없습니다." });
        mockDB.cart.splice(idx, 1);
        return mockResponse(204, null);
      }

      // ── Orders ──
      if (method === "GET" && path === "/orders") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        return mockResponse(200, paginate(mockDB.orders.filter(o => o.userId === user.id), params));
      }
      if (method === "POST" && path === "/orders") {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const items = (body.items || []).map(i => { const p = mockDB.products.find(p => p.id === i.productId); return { productId: i.productId, productName: p?.name, price: p?.price || 0, quantity: i.quantity }; });
        const order = { id: mockDB.nextId.order++, userId: user.id, items, totalPrice: items.reduce((s, i) => s + i.price * i.quantity, 0) - (body.usePoint || 0), status: "pending", createdAt: new Date().toISOString() };
        mockDB.orders.push(order);
        return mockResponse(201, order);
      }
      if (method === "GET" && /^\/orders\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const order = mockDB.orders.find(o => o.id === parseInt(path.split("/")[2]) && o.userId === user.id);
        return order ? mockResponse(200, order) : mockResponse(404, { message: "주문을 찾을 수 없습니다." });
      }
      if (method === "PATCH" && /^\/orders\/\d+$/.test(path)) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        const order = mockDB.orders.find(o => o.id === parseInt(path.split("/")[2]));
        if (!order) return mockResponse(404, { message: "주문을 찾을 수 없습니다." });
        order.status = body.status || order.status;
        return mockResponse(200, order);
      }

      // ── Admin ──
      if (path.startsWith("/admin")) {
        const user = requireAuth(headers);
        if (!user) return mockResponse(401, { message: "인증이 필요합니다." });
        if (user.role !== "admin") return mockResponse(403, { message: "관리자 권한이 필요합니다." });

        if (method === "GET" && path === "/admin/users") return mockResponse(200, paginate(mockDB.users.map(({password:_,...u})=>u), params));
        if (method === "GET" && /^\/admin\/users\/\d+$/.test(path)) { const u = mockDB.users.find(u => u.id === parseInt(path.split("/")[3])); return u ? mockResponse(200, (({password:_,...s})=>s)(u)) : mockResponse(404, { message: "사용자를 찾을 수 없습니다." }); }
        if (method === "PATCH" && /^\/admin\/users\/\d+$/.test(path)) { const u = mockDB.users.find(u => u.id === parseInt(path.split("/")[3])); if (!u) return mockResponse(404, {}); Object.assign(u, body); return mockResponse(200, (({password:_,...s})=>s)(u)); }
        if (method === "DELETE" && /^\/admin\/users\/\d+$/.test(path)) { mockDB.users = mockDB.users.filter(u => u.id !== parseInt(path.split("/")[3])); return mockResponse(204, null); }
        if (method === "GET" && path === "/admin/products") return mockResponse(200, paginate(mockDB.products, params));
        if (method === "GET" && /^\/admin\/products\/\d+$/.test(path)) { const p = mockDB.products.find(p => p.id === parseInt(path.split("/")[3])); return p ? mockResponse(200, p) : mockResponse(404, {}); }
        if (method === "POST" && path === "/admin/products") { const p = { id: mockDB.nextId.product++, ...body, createdAt: new Date().toISOString() }; mockDB.products.push(p); return mockResponse(201, p); }
        if (method === "PATCH" && /^\/admin\/products\/\d+$/.test(path)) { const p = mockDB.products.find(p => p.id === parseInt(path.split("/")[3])); if (!p) return mockResponse(404, {}); Object.assign(p, body); return mockResponse(200, p); }
        if (method === "DELETE" && /^\/admin\/products\/\d+$/.test(path)) { mockDB.products = mockDB.products.filter(p => p.id !== parseInt(path.split("/")[3])); return mockResponse(204, null); }
        if (method === "GET" && path === "/admin/reviews") return mockResponse(200, paginate(mockDB.reviews, params));
        if (method === "PATCH" && /^\/admin\/reviews\/\d+$/.test(path)) { const r = mockDB.reviews.find(r => r.id === parseInt(path.split("/")[3])); if (!r) return mockResponse(404, {}); Object.assign(r, body); return mockResponse(200, r); }
        if (method === "DELETE" && /^\/admin\/reviews\/\d+$/.test(path)) { mockDB.reviews = mockDB.reviews.filter(r => r.id !== parseInt(path.split("/")[3])); return mockResponse(204, null); }
        if (method === "GET" && path === "/admin/orders") return mockResponse(200, paginate(mockDB.orders, params));
        if (method === "GET" && /^\/admin\/orders\/\d+$/.test(path)) { const o = mockDB.orders.find(o => o.id === parseInt(path.split("/")[3])); return o ? mockResponse(200, o) : mockResponse(404, {}); }
        if (method === "PATCH" && /^\/admin\/orders\/\d+$/.test(path)) { const o = mockDB.orders.find(o => o.id === parseInt(path.split("/")[3])); if (!o) return mockResponse(404, {}); Object.assign(o, body); return mockResponse(200, o); }
      }

      return mockResponse(404, { message: `[Mock] 등록되지 않은 경로: ${method} ${path}` });
    };
    // ─── MOCK SERVER END ──────────────────────────────────────

    window.onload = () => {
      SwaggerUIBundle({
        spec,
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
        deepLinking: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        docExpansion: "list",
        filter: true,
        showExtensions: true,
        showCommonExtensions: true,
        tryItOutEnabled: true
      });
    };
  </script>
</body>
</html>
