<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제품 수정</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
    <script type="module" src="./components/product/index.js"></script>
    <script type="module" src="./components/product/edit.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <div
      class="bg-white w-full max-w-lg max-h-[95vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-gray-200"
    >
      <div
        class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10"
      >
        <h2 class="text-xl font-bold text-gray-900">제품 수정</h2>
        <button
          id="backBtnTop"
          class="text-gray-400 hover:text-black cursor-pointer"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form
        id="productEditForm"
        class="flex-1 overflow-y-auto p-6 space-y-5 bg-white"
      >
        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >제품명</label
          >
          <input
            name="name"
            type="text"
            class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
            required
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
              >가격</label
            >
            <input
              name="price"
              type="number"
              class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              required
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
              >카테고리</label
            >
            <select
              name="category"
              class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none bg-white"
            >
              <option value="sunglasses">선글라스</option>
              <option value="optical">안경</option>
              <option value="collection">컬렉션</option>
            </select>
          </div>
        </div>
        <div>
          <label
            class="block text-xs font-bold text-[#0a0a0a] mb-1.5 uppercase tracking-wide"
            >색상</label
          >

          <div id="colorContainer" class="space-y-2 mb-2">
            <div class="flex items-center gap-2">
              <input
                name="colors"
                type="text"
                placeholder="Black"
                class="flex-1 border border-gray-200 rounded-xl h-11 px-4 text-sm focus:border-black outline-none"
              />
              <button
                type="button"
                class="remove-color-btn text-[#d92d20] p-2 hover:bg-red-50 rounded-lg transition-colors"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  />
                </svg>
              </button>
            </div>
          </div>

          <button
            id="addColorBtn"
            type="button"
            class="w-full border border-dashed border-gray-300 rounded-xl h-11 text-xs font-medium text-[#667085] hover:bg-gray-50 transition-colors"
          >
            + 색상 추가
          </button>
        </div>

        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >설명</label
          >
          <textarea
            name="description"
            class="w-full border border-gray-200 rounded-xl p-4 text-sm h-32 resize-none focus:ring-1 focus:ring-black outline-none"
          ></textarea>
        </div>

        <div>
          <label class="block text-xs font-bold mb-1.5 uppercase text-gray-700"
            >재고 수량</label
          >
          <input
            name="stock"
            type="number"
            class="w-full border border-gray-200 rounded-xl h-11 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold text-[#0a0a0a] mb-1.5 uppercase tracking-wide"
            >이미지</label
          >
          <input type="file" id="imageInput" accept="image/*" class="hidden" />

          <div
            id="imageUploadBtn"
            class="w-full border border-gray-200 rounded-xl h-48 flex flex-col items-center justify-center group cursor-pointer hover:bg-gray-50 overflow-hidden relative"
          >
            <div id="uploadPlaceholder" class="flex flex-col items-center">
              <span class="text-sm text-gray-300">이미지 업로드</span>
              <svg
                class="w-8 h-8 text-gray-400 mt-2"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
                />
              </svg>
            </div>
            <img
              id="imagePreview"
              src=""
              class="hidden w-full h-full object-cover absolute inset-0"
            />
          </div>
          <input type="hidden" name="imageUrl" id="imageUrlInput" />
        </div>

        <div class="pt-4 border-t border-gray-100">
          <p class="text-[11px] font-bold text-gray-400 mb-4 uppercase">
            스펙시피케이션
          </p>
          <div class="space-y-3">
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >프레임 너비</span
              >
              <input
                name="frameWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >렌즈 높이</span
              >
              <input
                name="lensHeight"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >렌즈 너비</span
              >
              <input
                name="lensWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >브릿지 너비</span
              >
              <input
                name="bridgeWidth"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
            <div class="flex items-center justify-between gap-4">
              <span class="text-xs font-bold w-24 text-gray-600"
                >템플 길이</span
              >
              <input
                name="templeLength"
                type="text"
                class="flex-1 border border-gray-200 rounded-xl h-10 px-4 text-sm focus:ring-1 focus:ring-black outline-none"
              />
            </div>
          </div>
        </div>
      </form>

      <div class="p-6 border-t border-gray-100 grid grid-cols-2 gap-3 bg-white">
        <button
          type="button"
          id="backBtnBottom"
          class="h-12 bg-gray-100 text-gray-700 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors"
        >
          취소
        </button>
        <button
          form="productEditForm"
          type="submit"
          class="h-12 bg-black text-white rounded-xl font-bold text-sm hover:bg-zinc-800 transition-colors"
        >
          수정
        </button>
      </div>
    </div>
  </body>
</html>
