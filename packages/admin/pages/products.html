<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제품 관리</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
    <script type="module" src="./components/product/index.js"></script>
  </head>
  <body class="min-h-screen bg-[#f9fafb]">
    <div class="flex min-h-screen">
      <!-- 네비게이션 -->
      <aside
        class="hidden xl:row-span-2 xl:flex flex-col shrink-0 bg-white w-64 border-r border-(--admin-border) fixed h-full"
      ></aside>

      <div class="flex-1 flex flex-col min-w-0 xl:ml-64">
        <aside
          class="xl:hidden bg-white flex items-center justify-between px-5 h-14 border-b border-(--admin-border) sticky top-0 z-30"
        >
          <span class="text-base font-bold text-[#0a0a0a] tracking-brand"
            >GENTLE MONSTER</span
          >
          <div class="relative">
            <button
              id="naviMenuButton"
              class="p-1 text-(--admin-gray) cursor-pointer"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
            <div
              id="dropdownMenu"
              class="hidden absolute right-0 mt-2 w-44 bg-white border border-(--admin-border) rounded-[10px] shadow-sm overflow-hidden"
            >
              <a
                href="/pages/dashboard.html"
                class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
                >대시보드</a
              >
              <a
                href="/pages/users.html"
                class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
                >사용자 관리</a
              >
              <a
                href="/pages/products.html"
                class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
                >제품 관리</a
              >
              <a
                href="/pages/orders.html"
                class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
                >주문 관리</a
              >
              <div class="border-t border-(--admin-border)"></div>
              <a
                href="/pages/login.html"
                class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-red) hover:bg-red-50"
                >로그아웃</a
              >
            </div>
          </div>
        </aside>

        <header
          class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 p-8"
        >
          <h1 class="text-[24px] font-bold">제품 관리</h1>
          <div class="flex items-center gap-3">
            <div class="relative">
              <input
                id="search"
                class="border border-[#e4e7ec] rounded-lg h-10 w-60 pl-10 text-sm focus:outline-none focus:ring-1 focus:ring-black"
                type="text"
                placeholder="제품 검색..."
              />
              <svg
                class="absolute -translate-y-1/2 top-1/2 left-3 w-4 h-4 text-gray-400"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </div>
            <button
              id="addProductBtn"
              class="flex items-center gap-2 bg-[#0a0a0a] text-white px-4 h-10 rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                viewBox="0 0 24 24"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
              제품 추가
            </button>
          </div>
        </header>

        <main class="px-8 pb-8">
          <div
            class="bg-white border border-[#e4e7ec] rounded-xl overflow-hidden shadow-sm"
          >
            <div class="overflow-x-auto">
              <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-[#e4e7ec]">
                  <tr
                    class="text-[12px] text-[#667085] uppercase tracking-wider"
                  >
                    <th class="px-6 py-4 font-medium">제품 ID</th>
                    <th class="px-6 py-4 font-medium">이름</th>
                    <th class="px-6 py-4 font-medium">카테고리</th>
                    <th class="px-6 py-4 font-medium">가격</th>
                    <th class="px-6 py-4 font-medium">재고</th>
                    <th class="px-6 py-4 font-medium text-right">작업</th>
                  </tr>
                </thead>
                <tbody
                  id="productTableBody"
                  class="divide-y divide-[#e4e7ec]"
                ></tbody>
              </table>
            </div>
          </div>

          <div class="mt-6 flex flex-col items-center gap-4">
            <div
              id="listButtonComponents"
              class="flex gap-1 justify-center"
            ></div>
            <p class="text-[#667085] text-[14px]">
              총
              <span id="orderListTotal" class="font-medium text-black">0</span
              >건 중
              <span id="orderListNum" class="font-medium text-black">1-20</span
              >건 표시
            </p>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
