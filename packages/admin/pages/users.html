<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유저 관리</title>
    <link rel="stylesheet" href="/style.css" />
    <script type="module" src="/main.js"></script>
    <script type="module" src="./components/user/index.js"></script>
  </head>
  <body
    class="font-gentle bg-(--bg) xl:grid xl:grid-cols-[256px_1fr] xl:grid-rows-[auto_1fr] min-h-screen"
  >
    <!-- 네비게이션 -->
    <aside
      class="hidden xl:row-span-2 xl:flex flex-col shrink-0 bg-white w-64 border-r border-(--admin-border)"
    ></aside>

    <!-- 모바일 네비게이션 -->
    <aside
      class="xl:hidden bg-white flex items-center justify-between px-5 h-14 border-b border-(--admin-border) sticky top-0 z-30"
    >
      <span class="text-base font-bold text-[#0a0a0a] tracking-brand"
        >GENTLE MONSTER</span
      >
      <div class="relative">
        <button
          id="naviMenuButton"
          class="p-1 text-(--admin-gray) cursor-pointer"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <div
          id="dropdownMenu"
          class="hidden absolute right-0 mt-2 w-44 bg-white border border-(--admin-border) rounded-[10px] shadow-sm overflow-hidden"
        >
          <a
            href="/admin/pages/dashboard.html"
            class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
            >대시보드</a
          >
          <a
            href="/admin/pages/users.html"
            class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
            >사용자 관리</a
          >
          <a
            href="/admin/pages/products.html"
            class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
            >제품 관리</a
          >
          <a
            href="/admin/pages/orders.html"
            class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-gray) hover:bg-gray-50"
            >주문 관리</a
          >
          <div class="border-t border-(--admin-border)"></div>
          <a
            href="/admin/pages/login.html"
            class="flex items-center px-4 py-3 gap-3 text-sm font-medium text-(--admin-red) hover:bg-red-50"
            >로그아웃</a
          >
        </div>
      </div>
    </aside>

    <header
      class="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 p-8"
    >
      <h1 class="text-[24px] font-bold">사용자 관리</h1>
      <div class="flex gap-4 h-11">
        <div class="relative">
          <input
            id="search"
            class="border border-(--admin-border) rounded-lg h-11 w-[256px] pl-10"
            type="text"
            placeholder="사용자 검색..."
          />
          <svg
            class="absolute -translate-y-1/2 top-1/2 left-1.5"
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M9.15979 15.8216C12.839 15.8216 15.8215 12.8391 15.8215 9.15991C15.8215 5.48073 12.839 2.49817 9.15979 2.49817C5.48061 2.49817 2.49805 5.48073 2.49805 9.15991C2.49805 12.8391 5.48061 15.8216 9.15979 15.8216Z"
              stroke="#99A1AF"
              stroke-width="1.66543"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M17.4869 17.4871L13.9062 13.9064"
              stroke="#99A1AF"
              stroke-width="1.66543"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
    </header>

    <main class="px-8">
      <!-- 주문 관리 테이블 -->
      <div
        class="bg-white border border-[#e4e7ec] rounded-xl overflow-hidden shadow-sm"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 border-b border-[#e4e7ec]">
              <tr class="text-[12px] text-[#667085] uppercase tracking-wider">
                <th class="px-6 py-4 font-medium">사용자 ID</th>
                <th class="px-6 py-4 font-medium">이름</th>
                <th class="px-6 py-4 font-medium">이메일</th>
                <th class="px-6 py-4 font-medium">전화번호</th>
                <th class="px-6 py-4 font-medium">포인트</th>
                <th class="px-6 py-4 font-medium">가입일</th>
                <th class="px-6 py-4 font-medium text-right">작업</th>
              </tr>
            </thead>
            <tbody
              id="productTableBody"
              class="divide-y divide-[#e4e7ec]"
            ></tbody>
          </table>
        </div>
      </div>

      <!-- 페이지 번호 및 텍스트 -->
      <div class="flex flex-col text-center gap-4">
        <div id="listButtonComponents" class="flex gap-1 justify-center">
          <button
            class="text-[14px] py-2 px-3.75 border border-(--admin-border) rounded-lg"
            data-set="1"
          >
            1
          </button>
        </div>
        <p class="text-(--admin-page) text-[14px]">
          총 <span id="ListTotal"></span>건 중 <span id="ListNum">1-20</span>건
          표시
        </p>
      </div>
    </main>
  </body>
</html>
