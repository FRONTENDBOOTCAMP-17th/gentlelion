<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품 상세 | 젠틀라이온 | 공식 온라인 스토어</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../components/style.css" />
    <script type="module" src="../layout.js"></script>
    <script type="module" src="../main.js"></script>
    <script type="module">
      import { initProductDetail } from "../components/product-detail/init.js";
      initProductDetail();
    </script>
  </head>

  <body class="font-gentle bg-[#F3F4F6] text-[#111111]" data-theme="light">
    <div
      id="mobileMenu"
      class="fixed opacity-0 pointer-events-none transition-all duration-500 top-0 z-49 left-0 bg-white w-screen h-full"
    ></div>
    <aside class="navigation mx-3 md:px-8 lg:px-15"></aside>

    <div class="min-h-screen">
      <div class="flex flex-col md:flex-row md:min-h-screen">
        <div class="w-full md:flex-1 md:min-w-0 md:flex md:flex-col">
          <div
            class="block min-[769px]:hidden w-full"
            id="mobileCarouselWrap"
          ></div>
          <div class="hidden min-[769px]:block" id="desktopThumbBox"></div>
        </div>
        <div
          class="w-full md:flex-shrink-0 md:w-[380px]"
          id="productInfoWrap"
        ></div>
      </div>

      <section
        id="similarSection"
        class="hidden px-[24px] md:px-[60px] pt-[48px] pb-[60px]"
      ></section>
    </div>
  </body>
</html>
