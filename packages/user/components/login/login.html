<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login / register</title>
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="./handlerLogin.js"></script>
    <script type="module" src="../../layout.js"></script>
  </head>
  <body class="bg-(--bg) antialiased h-screen flex flex-col" data-theme="light">
    <aside class="navigation mx-3 md:px-8 lg:px-15"></aside>
    <main
      class="flex-1 flex flex-col items-center justify-center w-full max-w-162 mx-auto px-4 py-12"
    >
      <div class="w-full">
        <div class="h-14 flex items-center mb-4 md:justify-center">
          <h1 class="text-[18px] font-medium uppercase md:text-center">
            로그인 / 계정 생성
          </h1>
        </div>

        <p class="text-[13px] leading-[1.6] text-[#111] mb-8">
          이메일 주소를 입력하시면 이전에 생성된 계정이 있는지 확인해
          드리겠습니다. 또는 비회원으로도 계속 진행하실 수 있습니다.
        </p>

        <form id="loginForm" class="space-y-6">
          <div class="space-y-1.5">
            <div class="text-[11px] text-[#858585] text-right">
              *필수 입력 항목
            </div>
            <div class="relative flex flex-col gap-4">
              <input
                type="email"
                id="emailInput"
                placeholder="이메일 주소*"
                required
                class="w-full h-13 px-3 bg-white border border-white rounded-lg text-[13px] outline-none focus:border-black transition-all placeholder-[#858585]"
              />
              <input
                type="password"
                id="pwInput"
                placeholder="비밀번호*"
                required
                class="w-full h-13 px-3 bg-white border border-white rounded-lg text-[13px] outline-none focus:border-black transition-all placeholder-[#858585]"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full cursor-pointer h-13 bg-[#111] text-white text-[13px] rounded-lg uppercase font-medium transition-colors"
          >
            계속하기
          </button>
          <a
            href="/components/login/register.html"
            class="flex justify-center items-center w-full h-13 bg-(--text-gray) text-white text-[13px] rounded-lg uppercase font-medium transition-colors"
          >
            회원가입
          </a>
        </form>
      </div>
    </main>
  </body>
</html>
