<div class="border-t border-[#e5e5e5]">
  <button
    class="acc-trigger w-full flex justify-between items-center py-[14px] bg-transparent border-none cursor-pointer"
    data-target="accDelivery"
  >
    <span
      id="accDeliveryLabel"
      class="text-[12px] leading-[17px] text-[#111111]"
    ></span>
    <span class="acc-icon text-[#111111]">+</span>
  </button>
  <div
    id="accDelivery"
    data-accordion-content
    class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out"
  >
    <p
      id="accDeliveryDesc"
      class="text-[12px] leading-[17px] text-[#111111] pb-[14px]"
    ></p>
  </div>
</div>
<div class="border-t border-[#e5e5e5]">
  <button
    class="acc-trigger w-full flex justify-between items-center py-[14px] bg-transparent border-none cursor-pointer"
    data-target="accDetail"
  >
    <span
      id="accDetailLabel"
      class="text-[12px] leading-[17px] text-[#111111]"
    ></span>
    <span class="acc-icon text-[#111111]">+</span>
  </button>
  <div
    id="accDetail"
    data-accordion-content
    class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out"
  >
    <div id="productDetails" class="flex flex-col gap-[2px] pb-[14px]"></div>
  </div>
</div>
<div class="border-t border-[#e5e5e5]">
  <button
    class="acc-trigger w-full flex justify-between items-center py-[14px] bg-transparent border-none cursor-pointer"
    data-target="accSize"
  >
    <span
      id="accSizeLabel"
      class="text-[12px] leading-[17px] text-[#111111]"
    ></span>
    <span class="acc-icon text-[#111111]">+</span>
  </button>
  <div
    id="accSize"
    data-accordion-content
    class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out"
  >
    <div id="productSize" class="flex flex-col gap-[2px] pb-[14px]"></div>
  </div>
</div>
